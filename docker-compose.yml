version: '3.8'

services:
  # ============================================
  # Backend API Server (Fastify)
  # ============================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: videx-api
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      - NODE_ENV=production
      - PORT=5002
      - MONGODB_URI=${MONGODB_URI}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    networks:
      - videx-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5002/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ============================================
  # Frontend (Next.js)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://api:5002}
    container_name: videx-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://api:5002}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - videx-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  videx-network:
    driver: bridge

# ============================================
# Notes:
# ============================================
# 1. MongoDB is external (MongoDB Atlas) - no local DB container
# 2. No Redis needed - stateless architecture
# 3. No worker needed - no background jobs
# 4. Both services are horizontally scalable
# 5. Use .env file for environment variables
# 6. For production, use docker-compose.prod.yml with proper secrets management
